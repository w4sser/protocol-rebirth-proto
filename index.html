<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Protocol Rebirth — Meta Prototype v0.1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{
    /* Protocol Rebirth design system — "Swedish summer nights" (assets/colors_and_type.css) */
    --bg:#07151C; --panel:#0C232C; --panel2:#123039; --line:#1C424C;
    --txt:#F2E9D6; --dim:#7E9088; --accent:#15D6BE; --accent2:#FF9D4D;
    --danger:#e05555; --track:#9A6DF0;
    --glow-teal:0 0 1px #3CF2DC, 0 0 14px rgba(60,242,220,.5);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; background:#000; overflow:hidden;}
  body{font-family:"IBM Plex Sans",-apple-system,"Segoe UI",Roboto,sans-serif;}
  #phone{width:100vw; height:100vh; background:var(--bg); color:var(--txt);
    display:flex; flex-direction:column; position:relative; overflow:hidden;}
  #topbar{display:flex; align-items:center; gap:10px; padding:6px 12px; background:var(--panel);
    border-bottom:1px solid var(--line); flex-shrink:0;}
  #topbar .title{font-size:11px; letter-spacing:.14em; color:var(--dim); text-transform:uppercase; white-space:nowrap;}
  #currencies{display:flex; gap:6px; margin-left:auto; font-size:11px; align-items:center; font-family:"IBM Plex Mono",monospace;}
  .cur{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:2px 8px; white-space:nowrap;}
  .cur b{color:var(--accent);}
  #devbtn{background:none; border:1px solid var(--line); color:var(--dim); border-radius:8px;
    padding:2px 8px; font-size:12px;}
  #main{flex:1; display:flex; overflow:hidden;}
  #tabs{display:flex; flex-direction:column; width:84px; background:var(--panel);
    border-right:1px solid var(--line); flex-shrink:0; padding-top:6px;}
  #tabs button{padding:14px 0; background:none; border:none; color:var(--dim); font-size:11px;
    letter-spacing:.06em; text-transform:uppercase; border-left:3px solid transparent; cursor:pointer;}
  #tabs button.active{color:var(--accent); font-weight:700; border-left-color:var(--accent); background:rgba(62,224,160,.05);}
  #app{flex:1; overflow-y:auto; padding:12px 16px 64px;}
  .s-module>*,.s-itemDetail>*,.s-end>*,.s-raidsim>*{max-width:640px; margin-inline:auto;}
  h1{font-family:"Archivo",sans-serif; font-weight:800; font-size:16px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:2px;}
  h2{font-family:"Archivo",sans-serif; font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); margin:12px 0 6px;}
  .sub{font-size:11px; color:var(--dim); margin-bottom:8px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:9px 12px; margin-bottom:8px;}
  .card.tap{cursor:pointer;}
  .card.selected{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  .card.locked{opacity:.45;}
  .row{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .small{font-size:11px; color:var(--dim);}
  .ok{color:var(--accent);} .warn{color:var(--accent2);} .bad{color:var(--danger);} .trackc{color:var(--track);}
  .pill{display:inline-block; font-size:10px; border:1px solid var(--line); border-radius:8px; padding:1px 6px;
    color:var(--dim); margin-right:4px;}
  button.primary{width:100%; padding:12px; background:linear-gradient(135deg,#3CF2DC,#15D6BE); color:#040E12; border:none; border-radius:10px;
    font-family:"Archivo",sans-serif; font-size:14px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; margin-top:10px; cursor:pointer;
    box-shadow:var(--glow-teal);}
  button.primary:disabled{background:var(--panel2); color:var(--dim);}
  button.ghost{width:100%; padding:10px; background:none; border:1px solid var(--line); color:var(--txt);
    border-radius:10px; font-size:13px; margin-top:8px; cursor:pointer;}
  button.ad{background:var(--accent2); color:#1c1503; border:none; border-radius:10px; padding:10px; width:100%;
    font-weight:700; font-size:13px; margin-top:8px; cursor:pointer;}
  .goalbar{background:linear-gradient(90deg,#10202b,#131a21); border:1px solid var(--track); border-radius:10px;
    padding:7px 12px; margin-bottom:10px; font-size:12px;}
  .goalbar b{color:var(--track);}
  #bitdock{position:absolute; bottom:10px; left:96px; max-width:46%; display:flex; gap:8px;
    align-items:flex-end; pointer-events:none; z-index:5;}
  #bitface{width:52px; height:52px; border-radius:50%; background:var(--panel2); border:2px solid var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--accent); flex-shrink:0;
    transition:filter .8s; box-shadow:0 0 12px rgba(62,224,160,.35);}
  body.bit-img #bitface{background:var(--panel2) url("assets/bit.png") 50% 36%/230% auto no-repeat; color:transparent;}
  #bitface.off{border-color:var(--line); color:var(--dim); filter:grayscale(1) brightness(.6);}
  #bitline{background:rgba(19,26,33,.96); border:1px solid var(--line); border-radius:10px 10px 10px 2px;
    padding:7px 10px; font-size:12px; color:var(--txt);}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:6px;}
  .slot{aspect-ratio:1; background:var(--panel); border:1px solid var(--line); border-radius:8px; display:flex;
    flex-direction:column; align-items:center; justify-content:center; font-size:10px; text-align:center; padding:3px;
    cursor:pointer; position:relative; color:var(--txt);}
  .slot .qty{position:absolute; bottom:2px; right:4px; font-size:9px; color:var(--dim);}
  .slot.reserved{border-color:var(--track);} .slot.secure{border-color:var(--accent2);}
  .slot.r-uncommon{border-left:3px solid var(--track);} .slot.r-rare{border-left:3px solid var(--accent2);}
  .slot.r-protocol{border-left:3px solid #c05ae0;} .slot.r-valuable{border-left:3px solid var(--accent);}
  .feed{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace; font-size:12px; line-height:1.9;}
  .feed .bitl{color:var(--accent);}
  .feed .hostile{color:var(--danger);}
  #overlay{position:absolute; inset:0; background:rgba(4,7,10,.93); z-index:20; display:flex; align-items:center;
    justify-content:center; padding:20px;}
  #overlay .inner{width:100%; max-width:480px; text-align:center; max-height:100%; overflow-y:auto;}
  .flagbanner{background:var(--track); color:#04121c; font-weight:800; font-size:13px; letter-spacing:.05em;
    padding:11px; border-radius:10px; margin:10px 0; animation:flash .5s ease 3;}
  @keyframes flash{0%,100%{filter:brightness(1);}50%{filter:brightness(1.7);}}
  .payoff{animation:pop .5s ease;}
  @keyframes pop{0%{transform:scale(.8); opacity:0;}100%{transform:scale(1); opacity:1;}}
  .shake{animation:shake .5s ease;}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}
    60%{transform:translate(-3px,-2px)}80%{transform:translate(3px,2px)}}
  #toast{position:absolute; top:44px; right:12px; width:300px; z-index:30; pointer-events:none;}
  .toastmsg{background:var(--panel2); border:1px solid var(--accent); border-radius:10px; padding:9px 12px;
    font-size:12px; margin-bottom:6px; animation:pop .4s ease;}
  .restbar{height:6px; background:var(--panel2); border-radius:3px; overflow:hidden; margin-top:6px;}
  .restbar>div{height:100%; background:var(--accent); transition:width 1.2s ease;}
  .radio{display:flex; gap:6px; margin-top:6px;}
  .radio .card{flex:1; text-align:center; margin:0; padding:8px 4px; font-size:11px;}
  select{width:100%; background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:8px;
    padding:7px; font-size:13px; margin-top:4px;}
  .kv{display:flex; justify-content:space-between; font-size:12px; padding:3px 0;}
  .devgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}
  .devgrid button{padding:9px 4px; background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    border-radius:8px; font-size:11px; cursor:pointer;}
  .progressmoved{border-left:3px solid var(--accent); padding-left:10px; margin:10px 0; font-size:12px; line-height:1.7;}
  #app.s-intro{background:linear-gradient(rgba(7,21,28,.35),rgba(7,21,28,.92)), url("assets/keyart-start-screen.png") center/cover no-repeat;}
  .fac{display:flex; flex-direction:row; gap:10px; margin:8px 0; padding:12px;
    background:linear-gradient(rgba(7,21,28,.84),rgba(7,21,28,.93)), url("assets/env-bunker.png") center/cover no-repeat;
    border:1px solid var(--line); border-radius:12px;
    position:relative; min-height:230px;}
  .fac::before{content:""; position:absolute; top:50%; left:10px; right:10px; height:2px;
    background:repeating-linear-gradient(90deg,var(--line) 0 6px,transparent 6px 12px); opacity:.5;}
  .facrow{display:flex; flex-direction:column; gap:10px; flex:1; position:relative; z-index:1;}
  .facrow:first-child{flex:1.25;}
  .room{flex:1; min-height:0; border:1px solid var(--line); border-radius:10px; padding:8px 10px;
    background:linear-gradient(180deg,#151d26,#101820); cursor:pointer; position:relative; overflow:hidden;
    transition:filter .8s, box-shadow .8s, border-color .8s; display:flex; flex-direction:column;}
  .roomname{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim);
    display:flex; justify-content:space-between;}
  .roomname .lvl{color:var(--accent); font-weight:800;}
  .room.built .roomname{color:var(--txt);}
  .room.dark{filter:brightness(.35) saturate(.1); cursor:default;}
  .room.dark .roomname{color:#3a4550;}
  .room.broken{filter:saturate(.25) brightness(.75);}
  .room.broken::after{content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:
      linear-gradient(105deg, transparent 42%, rgba(0,0,0,.75) 43%, transparent 44%),
      linear-gradient(23deg, transparent 63%, rgba(0,0,0,.7) 64%, transparent 65.5%),
      linear-gradient(160deg, transparent 22%, rgba(0,0,0,.6) 23%, transparent 24%);}
  .room.broken .roomart{animation:brokenflicker 3.1s infinite;}
  @keyframes brokenflicker{0%,91%,94%,100%{opacity:.7}92%,95%{opacity:.25}}
  .room.ready{border-color:var(--accent); animation:readypulse 1.6s infinite;}
  @keyframes readypulse{0%,100%{box-shadow:0 0 0 0 rgba(62,224,160,0)}50%{box-shadow:0 0 16px 2px rgba(62,224,160,.5)}}
  .room.built{border-color:#2c4a3e; box-shadow:inset 0 0 24px rgba(62,224,160,.07);}
  .fac.wake .room{animation:roomwake 1.1s both;}
  @keyframes roomwake{from{filter:brightness(.05) saturate(0)}to{}}
  .roomart{flex:1; min-height:34px; display:flex; align-items:center; justify-content:center; margin:4px 0;}
  .corering{width:44px; height:44px; border-radius:50%; border:3px solid var(--accent);
    box-shadow:0 0 18px rgba(62,224,160,.7), inset 0 0 12px rgba(62,224,160,.5); animation:corepulse 2s infinite;}
  @keyframes corepulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  .roomart.off .corering{border-color:#2c3742; box-shadow:none; animation:none;}
  .fabbars{display:flex; gap:5px; align-items:flex-end; height:34px;}
  .fabbars i{width:9px; background:var(--accent2); border-radius:2px; animation:fabpump 1.1s infinite;}
  .fabbars i:nth-child(1){height:60%;} .fabbars i:nth-child(2){height:95%; animation-delay:.2s;}
  .fabbars i:nth-child(3){height:45%; animation-delay:.4s;}
  @keyframes fabpump{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.55)}}
  .roomart.off .fabbars i{background:#2c3742; animation:none;}
  .bitart{width:40px; height:40px; border-radius:50%; border:2px solid var(--accent); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:13px; animation:bithover 2.4s ease-in-out infinite;}
  body.bit-img .bitart{background:url("assets/bit.png") 50% 36%/230% auto no-repeat; color:transparent;}
  @keyframes bithover{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .roomart.off .bitart{border-color:#2c3742; color:#3a4550; animation:none; filter:grayscale(1) brightness(.5);}
  .crates{display:grid; grid-template-columns:repeat(3,14px); gap:3px;}
  .crates i{width:14px; height:11px; background:var(--accent2); opacity:.85; border-radius:2px;}
  .roomart.off .crates i{background:#2c3742;}
  .chips{display:flex; flex-wrap:wrap; gap:3px;}
  .chip{font-size:9px; letter-spacing:.02em; background:rgba(0,0,0,.45); border:1px solid var(--line);
    border-radius:7px; padding:1px 5px; color:var(--dim); white-space:nowrap;}
  .chip.ok{color:var(--accent); border-color:#2c4a3e;}
  .chip.need{color:var(--accent2); border-color:#4a3f1e;}
  .chip.track{color:var(--track); border-color:var(--track);}
  .roombar{height:4px; background:rgba(0,0,0,.5); border-radius:2px; overflow:hidden; margin-top:5px;}
  .roombar>div{height:100%; background:linear-gradient(90deg,var(--track),var(--accent)); transition:width .8s ease;}
  .prepgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:0 16px; align-items:start;}
  .pcol{min-width:0;}
  .nextup{border:1px solid var(--track); border-radius:12px; padding:10px 14px; margin:12px 0 4px;
    background:linear-gradient(135deg,#0e1c26,#131a21); animation:pop .5s ease;}
  .nu-head{font-size:10px; letter-spacing:.14em; color:var(--track); text-transform:uppercase; margin-bottom:2px;}
  .nubar{height:9px; background:rgba(0,0,0,.55); border-radius:5px; overflow:hidden; margin:7px 0 5px;
    border:1px solid var(--line);}
  .nubar>div{height:100%; background:linear-gradient(90deg,var(--track),var(--accent));
    animation:nufill 1.1s ease; box-shadow:0 0 8px rgba(62,224,160,.6);}
  @keyframes nufill{from{width:0}}
  .boot{font-family:"IBM Plex Mono",ui-monospace,Menlo,monospace; font-size:13px; color:var(--accent); text-align:left;
    min-height:150px; line-height:2;}
  .boot div{animation:pop .3s ease;}
  .bootflash{font-size:17px; font-weight:800; letter-spacing:.1em; margin-top:12px;
    animation:flash .4s ease 4 !important;}
  .dustwrap{position:relative; height:0;}
  .dustwrap i{position:absolute; width:3px; height:3px; border-radius:50%; background:var(--dim); opacity:0;
    animation:dustup 1.6s ease-out forwards;}
  @keyframes dustup{0%{opacity:.8; transform:translateY(0)}100%{opacity:0; transform:translateY(-46px)}}
  #rotate{display:none; position:absolute; inset:0; z-index:50; background:var(--bg); color:var(--txt);
    align-items:center; justify-content:center; flex-direction:column; gap:12px; text-align:center; padding:30px;}
  #rotate .phoneicon{font-size:40px; animation:rotphone 1.6s ease-in-out infinite;}
  @keyframes rotphone{0%,20%{transform:rotate(0)}60%,100%{transform:rotate(90deg)}}
  @media (orientation: portrait){ #rotate{display:flex;} }
</style>
</head>
<body class="base-dark">
<div id="phone">
  <div id="topbar">
    <span class="title">Protocol Rebirth</span>
    <div id="currencies"></div>
  </div>
  <div id="main">
    <nav id="tabs"></nav>
    <div id="app"></div>
  </div>
  <div id="bitdock" style="display:none">
    <div id="bitface">ᵕ‿ᵕ</div>
    <div id="bitline"></div>
  </div>
  <div id="toast"></div>
  <div id="rotate"><div class="phoneicon">📱</div><b>ROTATE YOUR DEVICE</b>
    <span class="small">Protocol Rebirth plays in landscape</span></div>
</div>
<script src="data/items.js"></script>
<script src="data/modules.js"></script>
<script src="data/bit.js"></script>
<script src="data/raid_zones.js"></script>
<script src="data/recipes.js"></script>
<script src="data/vendors.js"></script>
<script src="data/retention.js"></script>
<script src="data/progression.js"></script>
<script src="app.js"></script>
</body>
</html>
